name: PDM20 Bootloader Release

on:
  push:
    tags: ['pdm-20-bootloader/v[0-9]+.[0-9]+.[0-9]+']

jobs:
  ci:
    name: Continuous Integration
    uses: ./.github/workflows/ci.yaml

  build:
    name: Build bootloader
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          targets: thumbv7em-none-eabihf
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Install binutils (objcopy)
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-arm-none-eabi
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#pdm-20/v}" >> "$GITHUB_OUTPUT"
        # Strips 'pdm-20/v' prefix, leaving e.g. '1.2.3'
      - name: Build pdm-20 bootloader
        run: |
          cargo build --release --locked \
            --target thumbv7em-none-eabihf \
            -p pdm-20-bootloader
      - name: Patch bootloader header
        run: |
          cargo xtask patch-header \
            --version ${{ steps.version.outputs.VERSION }} \
            --target PD20 \
            --bootloader \
            target/thumbv7em-none-eabihf/release/pdm-20-bootloader
      - run: mkdir dist
      - name: Extract bootloader binary
        run: |
          arm-none-eabi-objcopy \
            -O binary \
            target/thumbv7em-none-eabihf/release/pdm-20-bootloader \
            dist/pdm-20-bootloader-${{ steps.version.outputs.VERSION }}.bin
      - name: Sign bootloader
        env:
          FIRMWARE_PRIVKEY_SEED: ${{ secrets.SECRET_KEY_PDM20 }}
        run: |
          cargo xtask sign \
            dist/pdm-20-bootloader-${{ steps.version.outputs.VERSION }}.bin
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdm-20-release
          path: dist/

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bootloader
        uses: actions/download-artifact@v4
        with:
          name: pdm-20-bootloader
          merge-multiple: true
          path: dist/
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#pdm-20-bootloader/v}" >> "$GITHUB_OUTPUT"
        # Strips 'pdm-20-bootloader/v' prefix, leaving e.g. '1.2.3' (always a tag in this job)
      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "pdm-20-release/*.signed.bin"
          name: "PDM20 Bootloader Release v${{ steps.version.outputs.VERSION }}"
          body: |
            See the [changelog](https://github.com/umi-eng/pdm/blob/main/bin/pdm-20-bootloader/CHANGELOG.md).
