[package]
name = "pdm-20-bootloader"
version = "0.1.0"
edition = "2024"

[dependencies]
cortex-m-link.workspace = true
header.workspace = true
defmt.workspace = true
defmt-rtt.workspace = true
cortex-m = { version = "0.7.6", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7.5"
embassy-boot-stm32 = { version = "0.8.0", features = ["defmt"] }
embassy-stm32 = { version = "0.6.0", features = ["stm32g474ve", "single-bank", "defmt"] }
embassy-sync = "0.8.0"
