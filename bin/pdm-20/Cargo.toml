[package]
name = "pdm-20"
version = "0.2.2"
edition = "2024"

[dependencies]
messages = { workspace = true, features = ["defmt", "device"] }
saelient = { workspace = true, features = ["defmt-1"] }
analog.workspace = true
vpd.workspace = true
header = { workspace = true, features = ["defmt"] }
cortex-m-link.workspace = true
blocking-executor.workspace = true

defmt.workspace = true
defmt-rtt.workspace = true
paste.workspace = true
zerocopy.workspace = true
embedded-can.workspace = true
panic-probe = { version = "1.0.0", features = ["print-defmt"] }
cortex-m = { version = "0.7.7", features = ["critical-section-single-core"] }
rtic = { version = "2.2.0", features = ["thumbv7-backend"] }
rtic-monotonics = { version = "2.1.0", features = ["cortex-m-systick", "defmt"] }
rtic-sync = { version = "1.4.0", features = ["defmt-03"] }
embassy-stm32 = { version = "0.6.0", features = [
    "stm32g474ve",
    "single-bank",
    "defmt",
    "unstable-pac",
] }
embassy-boot-stm32 = { version = "0.8.0", features = [
    "defmt",
] }
embassy-sync = { version = "0.8.0", features = [
    "defmt",
] }
embassy-embedded-hal = "0.6.0"
embassy-boot = { version = "0.7.0", features = [
    "defmt",
    "ed25519-salty",
] }
sequential-storage = { version = "7.2.0", features = ["defmt", "postcard"] }
embedded-hal = "1.0.0"
postcard = "1.1.3"
serde = { version = "1.0.228", default-features = false }

[build-dependencies]
header.workspace = true
